
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#game-wrap { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 0; font-family: var(--font-sans); }
#score-row { display: flex; gap: 2rem; margin-bottom: 1rem; }
.score-box { text-align: center; }
.score-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.score-val { font-size: 22px; font-weight: 500; color: var(--text-primary); }
#canvas { border: 0.5px solid var(--border-strong); border-radius: 8px; display: block; background: var(--surface-1); }
#msg { margin-top: 1rem; font-size: 14px; color: var(--text-secondary); text-align: center; min-height: 20px; }
#btn-row { display: flex; gap: 10px; margin-top: 1rem; }
button { padding: 8px 20px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s; }
button:hover { background: var(--surface-1); }
button.primary { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); }
button.primary:hover { opacity: 0.85; }
#dpad { display: grid; grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(3, 44px); gap: 4px; margin-top: 1rem; }
#dpad button { width: 44px; height: 44px; padding: 0; font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); }
</style>

<div id="game-wrap">
  <h2 class="sr-only">贪吃蛇游戏</h2>
  <div id="score-row">
    <div class="score-box">
      <div class="score-label">分数</div>
      <div class="score-val" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">最高分</div>
      <div class="score-val" id="best">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">速度</div>
      <div class="score-val" id="level">1</div>
    </div>
  </div>
  <canvas id="canvas" width="320" height="320"></canvas>
  <div id="msg">按空格键或点击「开始」</div>
  <div id="btn-row">
    <button class="primary" id="startBtn">开始</button>
    <button id="pauseBtn" style="display:none">暂停</button>
  </div>
  <div id="dpad">
    <div></div>
    <button id="up">↑</button>
    <div></div>
    <button id="left">←</button>
    <div></div>
    <button id="right">→</button>
    <div></div>
    <button id="down">↓</button>
    <div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const CELL = 16, COLS = 20, ROWS = 20;
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const levelEl = document.getElementById('level');
const msgEl = document.getElementById('msg');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');

let snake, dir, nextDir, food, score, best = 0, running = false, paused = false, timer;

function isDark() {
  return document.documentElement.getAttribute('data-mode') === 'dark' ||
    (!document.documentElement.getAttribute('data-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
}

function getColors() {
  const d = isDark();
  return {
    bg: d ? '#1e1e1c' : '#f6f5f0',
    grid: d ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
    snakeHead: d ? '#a8a5f6' : '#534AB7',
    snakeBody: d ? '#7f7dd4' : '#7F77DD',
    snakeTail: d ? '#4e4c96' : '#AFA9EC',
    food: d ? '#5DCAA5' : '#0F6E56',
    foodBright: d ? '#9FE1CB' : '#1D9E75',
    text: d ? '#f1efe8' : '#2c2c2a',
  };
}

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; scoreEl.textContent = '0';
  levelEl.textContent = '1';
  placeFood();
}

function placeFood() {
  const occupied = new Set(snake.map(s => s.x+','+s.y));
  let f;
  do { f = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (occupied.has(f.x+','+f.y));
  food = f;
}

function speed() { return Math.max(60, 200 - Math.floor(score/50)*20); }

function step() {
  if (paused) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    levelEl.textContent = Math.floor(score/50) + 1;
    placeFood();
    clearTimeout(timer); timer = setTimeout(step, speed());
  } else {
    snake.pop();
    clearTimeout(timer); timer = setTimeout(step, speed());
  }
  draw();
}

function draw() {
  const c = getColors();
  ctx.fillStyle = c.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = c.grid;
  ctx.lineWidth = 0.5;
  for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke(); }
  for (let j=0;j<=ROWS;j++) { ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke(); }

  snake.forEach((seg, i) => {
    const t = i / snake.length;
    ctx.fillStyle = i === 0 ? c.snakeHead : (t < 0.4 ? c.snakeBody : c.snakeTail);
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, i===0?5:3);
    ctx.fill();
    if (i === 0) {
      ctx.fillStyle = c.bg;
      const ew = dir.x !== 0;
      const ex1 = ew ? (dir.x>0 ? seg.x*CELL+CELL-6 : seg.x*CELL+3) : seg.x*CELL+4;
      const ey1 = ew ? seg.y*CELL+4 : (dir.y>0 ? seg.y*CELL+CELL-6 : seg.y*CELL+3);
      const ex2 = ew ? ex1 : seg.x*CELL+CELL-6;
      const ey2 = ew ? seg.y*CELL+CELL-6 : ey1;
      ctx.fillRect(ex1, ey1, 2.5, 2.5);
      ctx.fillRect(ex2, ey2, 2.5, 2.5);
    }
  });

  const t = Date.now() / 500;
  const pulse = 0.85 + 0.15 * Math.sin(t * Math.PI * 2);
  ctx.fillStyle = c.foodBright;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, (CELL/2-2)*pulse, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = c.food;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, (CELL/2-4)*pulse, 0, Math.PI*2);
  ctx.fill();
}

function gameOver() {
  running = false;
  clearTimeout(timer);
  startBtn.textContent = '再来一局';
  startBtn.style.display = '';
  pauseBtn.style.display = 'none';
  msgEl.textContent = `游戏结束！得了 ${score} 分`;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = '500 18px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 10);
  ctx.font = '400 14px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillText(`得分：${score}`, canvas.width/2, canvas.height/2 + 16);
}

function startGame() {
  if (running) return;
  initGame(); draw();
  running = true; paused = false;
  startBtn.style.display = 'none';
  pauseBtn.style.display = '';
  pauseBtn.textContent = '暂停';
  msgEl.textContent = '方向键或 WASD 控制';
  clearTimeout(timer); timer = setTimeout(step, speed());
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '继续' : '暂停';
  msgEl.textContent = paused ? '已暂停' : '方向键或 WASD 控制';
  if (!paused) { timer = setTimeout(step, speed()); }
}

startBtn.addEventListener('click', startGame);
pauseBtn.addEventListener('click', togglePause);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { if (!running) startGame(); else togglePause(); e.preventDefault(); return; }
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
                KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  const d = map[e.code];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) { nextDir = d; e.preventDefault(); }
});

document.getElementById('up').addEventListener('click', () => { if (dir.y!==1) nextDir={x:0,y:-1}; });
document.getElementById('down').addEventListener('click', () => { if (dir.y!==-1) nextDir={x:0,y:1}; });
document.getElementById('left').addEventListener('click', () => { if (dir.x!==1) nextDir={x:-1,y:0}; });
document.getElementById('right').addEventListener('click', () => { if (dir.x!==-1) nextDir={x:1,y:0}; });

let animId;
function loop() { if (running && !paused) draw(); animId = requestAnimationFrame(loop); }
loop();

draw();
</script>
